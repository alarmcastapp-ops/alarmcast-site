<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="400" height="400" viewBox="0 0 400 400" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <title>Wren — permission state 7: A branch · settling</title>
  <style>
    .parts,.tail,.wing,.beak,.lid { transform-box:fill-box; }
    .parts { transform-origin:50% 100%; }
    .tail  { transform-origin:100% 50%; }
    .wing  { transform-origin:100% 50%; }
    .beak  { transform-origin:0% 100%; }
    .lid   { transform-origin:50% 50%; }

    .m-breathe { animation:breathe 3.6s ease-in-out infinite; }
    .m-bob     { animation:bob     2.1s ease-in-out infinite; }
    .m-tilt    { animation:tilt    3.0s ease-in-out infinite; }
    .m-sway    { animation:sway    3.4s ease-in-out infinite; }
    .w-wag   { animation:wag     1.0s ease-in-out infinite; }
    .w-fl    { animation:flutter 0.5s ease-in-out infinite; }
    .w-sing  { animation:sing    0.55s ease-in-out infinite; }
    .w-blink { animation:blink   3.8s ease-in-out infinite; }
    .note    { animation:float 1.8s ease-in infinite; opacity:0; }
    .note.n2 { animation-delay:0.6s; } .note.n3 { animation-delay:1.2s; }

    @keyframes breathe { 0%,100%{transform:scaleY(1)}      50%{transform:scaleY(0.97)} }
    @keyframes bob     { 0%,100%{transform:translateY(0)}  50%{transform:translateY(-10px)} }
    @keyframes tilt    { 0%,100%{transform:rotate(0)}      50%{transform:rotate(-5deg)} }
    @keyframes sway    { 0%,100%{transform:rotate(-2.2deg)} 50%{transform:rotate(2.2deg)} }
    @keyframes wag     { 0%,100%{transform:rotate(0)}      50%{transform:rotate(8deg)} }
    @keyframes flutter { 0%,100%{transform:rotate(0)}      50%{transform:rotate(-16deg)} }
    @keyframes sing    { 0%,100%{transform:rotate(0)}      50%{transform:rotate(-20deg)} }
    @keyframes blink   { 0%,93%,100%{transform:scaleY(0)}  96%{transform:scaleY(1)} }
    @keyframes float {
      0%{opacity:0;transform:translate(0,0) scale(.6)} 15%{opacity:1} 80%{opacity:1}
      100%{opacity:0;transform:translate(34px,-100px) scale(1)}
    }
  </style>
  
  <path d="M70 322 Q150 300 220 304 T338 294" fill="none" stroke="#9C7B3A"
     stroke-width="10" stroke-linecap="round"/>
    <path d="M300 296 q14 -16 30 -14 q-6 14 -22 18 Z" fill="#3DD6C0"/>
    <path d="M276 300 q-2 -18 -16 -24 q-4 16 8 26 Z" fill="#3DD6C0" opacity="0.85"/>
  <g transform="translate(76,113) scale(0.62)"><g class="parts m-sway">
