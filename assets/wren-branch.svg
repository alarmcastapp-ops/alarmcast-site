    <g fill="#D69A33">
    <path d="M210 131 q-6 -20 -7 -35 q12 9 14 28 Z"/>
    <path d="M220 131 q-1 -23 1 -40 q5 16 3 33 Z"/>
    <path d="M230 131 q6 -20 7 -35 q-12 9 -14 28 Z"/></g>
    <circle cx="200" cy="206" r="86" fill="#EBC14D" stroke="#C0892A" stroke-width="2"/>
    <ellipse cx="206" cy="248" rx="50" ry="32" fill="#F7E09A"/>
    <path class="wing" d="M160 198 q50 -16 86 10 q-34 36 -86 4 Z" fill="#D69A33"/>
    <ellipse cx="233" cy="206" rx="12" ry="9" fill="#EF9B6B" opacity="0.5"/>
    <circle cx="250" cy="180" r="13" fill="#3A2A12"/>
       <circle cx="245" cy="175" r="4.5" fill="#fff"/>
       <circle cx="255" cy="185" r="2.5" fill="#fff" opacity="0.8"/>
    
    <path d="M278 192 L298 196 L278 200 Z" fill="#D9731F"/>
    <path class="beak" d="M278 192 L298 196 L278 188 Z" fill="#F08A2E"/>
    
  </g></g>
  
</svg>
