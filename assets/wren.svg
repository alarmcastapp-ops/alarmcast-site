<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="400" height="400" viewBox="0 0 400 400" version="1.1"
     xmlns="http://www.w3.org/2000/svg">
  <title>Alarmcast Wren mascot, singing</title>
  <!-- Wren: the Alarmcast mascot. Yellow body so she reads warm and morning-ish
       next to the purple UI. Music notes use the teal sound accent. -->
  <style>
    .bird, .beak, .note, .tail { transform-box: fill-box; }
    .bird  { animation: bob  2.4s ease-in-out infinite; transform-origin: center; }
    .beak  { animation: sing 0.6s ease-in-out infinite; transform-origin: left bottom; }
    .tail  { animation: wag  1.0s ease-in-out infinite; transform-origin: 100% 50%; }
    .note  { animation: float 1.8s ease-in infinite; opacity: 0; }
    .note.n2 { animation-delay: 0.6s; }
    .note.n3 { animation-delay: 1.2s; }
    @keyframes bob  { 0%,100% { transform: translateY(0); }  50% { transform: translateY(-8px); } }
    @keyframes sing { 0%,100% { transform: rotate(0deg); }   50% { transform: rotate(-20deg); } }
    @keyframes wag  { 0%,100% { transform: rotate(0deg); }   50% { transform: rotate(8deg); } }
    @keyframes float {
      0%   { opacity: 0; transform: translate(0,0)        scale(0.6) rotate(0deg); }
      15%  { opacity: 1; }
      80%  { opacity: 1; }
      100% { opacity: 0; transform: translate(34px,-100px) scale(1) rotate(12deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      .bird,.beak,.tail,.note { animation: none; }
      .note { opacity: 1; }
    }
  </style>

  <!-- floating music notes, teal sound accent, rise from the open beak tip -->
  <g fill="#3DD6C0">
    <g transform="translate(300,196)"><g class="note n1">
      <circle cx="0" cy="12" r="7.5"/>
      <rect x="6" y="-16" width="4" height="28" rx="2"/>
      <path d="M6 -16 q14 2.5 14 13 q-4 -7 -14 -7 Z"/>
    </g></g>
    <g transform="translate(314,200)"><g class="note n2">
      <circle cx="0" cy="10" r="6.5"/>
      <rect x="5.2" y="-14" width="3.6" height="24" rx="1.8"/>
      <path d="M5.2 -14 q12 2 12 11 q-3.5 -6 -12 -6 Z"/>
    </g></g>
    <g transform="translate(306,198)"><g class="note n3">
      <circle cx="0" cy="10" r="6"/>
      <rect x="4.8" y="-13" width="3.4" height="23" rx="1.7"/>
      <path d="M4.8 -13 q11 1.8 11 10 q-3.2 -5.5 -11 -5.5 Z"/>
    </g></g>
  </g>

  <!-- ============ Wren (side view) ============ -->
  <g class="bird">
    <!-- legs -->
    <g stroke="#E0982E" stroke-width="6" stroke-linecap="round">
      <line x1="186" y1="276" x2="186" y2="302"/>
      <line x1="214" y1="276" x2="214" y2="302"/>
    </g>
    <!-- tail -->
    <path class="tail" d="M122 222 q-44 0 -60 18 q40 8 62 -4 Z" fill="#D69A33"/>
    <!-- crest: tidy symmetric 3-feather tuft -->
    <g fill="#D69A33">
      <path d="M210 131 q-6 -20 -7 -35 q12 9 14 28 Z"/>
      <path d="M220 131 q-1 -23 1 -40 q5 16 3 33 Z"/>
      <path d="M230 131 q6 -20 7 -35 q-12 9 -14 28 Z"/>
    </g>
    <!-- body -->
    <circle cx="200" cy="206" r="86" fill="#EBC14D" stroke="#C0892A" stroke-width="2"/>
    <!-- pale tummy -->
    <ellipse cx="206" cy="248" rx="50" ry="32" fill="#F7E09A"/>
    <!-- wing -->
    <path d="M160 198 q50 -16 86 10 q-34 36 -86 4 Z" fill="#D69A33"/>
    <!-- cheek -->
    <ellipse cx="233" cy="206" rx="12" ry="9" fill="#EF9B6B" opacity="0.5"/>
    <!-- eye -->
    <circle cx="250" cy="180" r="13" fill="#3A2A12"/>
    <circle cx="245" cy="175" r="4.5" fill="#FFFFFF"/>
    <circle cx="255" cy="185" r="2.5" fill="#FFFFFF" opacity="0.8"/>
    <!-- beak: lower jaw fixed, upper jaw hinges open from the face -->
    <path d="M278 192 L298 196 L278 200 Z" fill="#D9731F"/>
    <path class="beak" d="M278 192 L298 196 L278 188 Z" fill="#F08A2E"/>
  </g>
</svg>
