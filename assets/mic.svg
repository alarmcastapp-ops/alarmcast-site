<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="400" height="400" viewBox="0 0 200 200" version="1.1"
     xmlns="http://www.w3.org/2000/svg">
  <title>Alarmcast — podcast mic (looping)</title>

  <!-- A real studio/podcast mic: slate body, silver collar, metal-grey stand.
       Sound waves use the teal secondary (sound accent). -->
  <style>
    .mic, .wave { transform-box: fill-box; }

    .mic { animation: micbob 2.4s ease-in-out infinite; transform-origin: center; }

    .wave {
      stroke: #3DD6C0; stroke-width: 5; stroke-linecap: round; fill: none;
      opacity: 0; animation: wavepulse 2.4s ease-in-out infinite; transform-origin: left center;
    }
    .wave.w2 { animation-delay: 0.8s; }

    @keyframes micbob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @keyframes wavepulse {
      0%   { opacity: 0;   transform: scale(0.88); }
      30%  { opacity: 0.4; }
      70%  { opacity: 0.4; }
      100% { opacity: 0;   transform: scale(1.04); }
    }
  </style>

  <g class="mic">
    <!-- capsule -->
    <rect x="58" y="28" width="64" height="98" rx="32" fill="#525A6B"/>
    <!-- grille -->
    <g stroke="#3A4150" stroke-width="6" stroke-linecap="round">
      <line x1="72" y1="54" x2="108" y2="54"/>
      <line x1="72" y1="70" x2="108" y2="70"/>
      <line x1="72" y1="86" x2="108" y2="86"/>
    </g>
    <!-- highlight -->
    <circle cx="111" cy="42" r="4" fill="#FFFFFF"/>
    <!-- collar -->
    <rect x="58" y="112" width="64" height="14" rx="7" fill="#C5CCD8"/>
    <!-- stand -->
    <path d="M56 100 v18 a34 34 0 0 0 68 0 v-18" fill="none" stroke="#878FA0" stroke-width="7" stroke-linecap="round"/>
    <line x1="90" y1="152" x2="90" y2="170" stroke="#878FA0" stroke-width="7" stroke-linecap="round"/>
    <line x1="66" y1="173" x2="114" y2="173" stroke="#878FA0" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- sound waves (teal) -->
  <path class="wave w1" d="M140 58 q14 18 0 36"/>
  <path class="wave w2" d="M158 48 q22 28 0 56"/>
</svg>
